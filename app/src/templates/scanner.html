{% extends "base.html" %}

{% block title %}QR Scanner - MaScan{% endblock %}

{% block content %}
<div class="scanner-container">
    <h1>QR Code Scanner</h1>

    <div class="scanner-setup">
        <div class="form-group">
            <label for="event-select">Select Event</label>
            <select id="event-select" required>
                <option value="">-- Choose an event --</option>
                {% for event in events %}
                <option value="{{ event[0] }}">{{ event[1] }} ({{ event[2] }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="time-slot">Time Slot</label>
            <select id="time-slot">
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
            </select>
        </div>
    </div>

    <div class="scanner-area">
        <div id="qr-reader" style="width: 100%; max-width: 500px; margin: 0 auto;"></div>
        <div id="scanner-status" class="scanner-status">Ready to scan...</div>
    </div>

    <div class="scanner-input">
        <input type="text" id="qr-input" placeholder="Or paste QR code data here" autofocus>
        <button type="button" id="submit-btn" class="btn btn-primary">Submit</button>
    </div>

    <div id="result-message" class="result-message"></div>

    <div class="marked-list">
        <h2>Marked Attendees</h2>
        <table id="attendance-table" class="table">
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Marked At</th>
                </tr>
            </thead>
            <tbody id="attendance-body">
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="{{ url_for('static', filename='js/scanner.js') }}"></script>

<style>
.scanner-container {
    max-width: 800px;
    margin: 0 auto;
    animation: fadeIn 0.5s ease-in;
}

.scanner-container h1 {
    text-align: center;
    margin-bottom: 30px;
    color: var(--primary-color);
    font-size: 2em;
    animation: slideInDown 0.5s ease-out;
}

.scanner-setup {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 30px;
    background: var(--card-bg);
    padding: 20px;
    border-radius: 8px;
    box-shadow: var(--shadow);
    animation: slideInUp 0.5s ease-out;
}

.form-group {
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.4s ease-out;
}

.form-group label {
    margin-bottom: 5px;
    font-weight: 600;
    color: var(--text-color);
}

.form-group select {
    padding: 10px;
    border: 1px solid var(--input-border);
    border-radius: 4px;
    font-size: 1em;
    background: var(--input-bg);
    color: var(--text-color);
    transition: var(--transition);
}

.form-group select:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.1);
}

.scanner-area {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: var(--shadow);
    animation: slideInUp 0.5s ease-out 0.1s backwards;
}

#qr-reader {
    border: 3px solid var(--primary-color);
    border-radius: 8px;
    overflow: hidden;
    animation: pulse 2s ease-in-out infinite;
}

.scanner-status {
    margin-top: 15px;
    padding: 12px;
    background: rgba(13, 110, 253, 0.1);
    color: var(--primary-color);
    border-radius: 4px;
    text-align: center;
    animation: fadeIn 0.3s ease-out;
    border-left: 3px solid var(--primary-color);
}

.scanner-input {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    animation: slideInUp 0.5s ease-out 0.2s backwards;
}

.scanner-input input {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--input-border);
    border-radius: 4px;
    font-size: 1em;
    background: var(--input-bg);
    color: var(--text-color);
    transition: var(--transition);
}

.scanner-input input::placeholder {
    color: var(--navbar-text);
}

.scanner-input input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(42, 115, 255, 0.1);
    transform: translateY(-2px);
}

#submit-btn {
    padding: 12px 24px;
}

.result-message {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 4px;
    display: none;
    animation: slideInDown 0.3s ease-out;
    border-left: 4px solid transparent;
}

.result-message.success {
    display: block;
    background: rgba(40, 167, 69, 0.1);
    color: #28a745;
    border-left-color: #28a745;
}

.result-message.error {
    display: block;
    background: rgba(220, 53, 69, 0.1);
    color: #dc3545;
    border-left-color: #dc3545;
}

.marked-list {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
    animation: slideInUp 0.5s ease-out 0.3s backwards;
}

.marked-list h2 {
    margin-top: 0;
    color: var(--text-color);
}

.marked-list table {
    width: 100%;
    border-collapse: collapse;
}

.marked-list tbody tr {
    animation: fadeIn 0.3s ease-out;
}

.marked-list tbody tr:hover {
    background: var(--table-hover);
    transform: scale(1.01);
}

@media (max-width: 600px) {
    .scanner-setup {
        grid-template-columns: 1fr;
    }

    .scanner-container h1 {
        font-size: 1.5em;
    }

    .scanner-input {
        flex-direction: column;
    }
}
</style>
{% endblock %}
