version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mascan-postgres
    environment:
      POSTGRES_USER: mascan
      POSTGRES_PASSWORD: mascan_dev_password
      POSTGRES_DB: mascan_attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mascan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mascan-web
    environment:
      FLASK_ENV: development
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DATABASE_URL: "postgresql://mascan:mascan_dev_password@postgres:5432/mascan_attendance"
      HOST: "0.0.0.0"
      PORT: "5000"
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "cd app && 
             python -c 'from flask_app import create_app, db; app = create_app(); 
             with app.app_context(): db.create_all()' &&
             gunicorn --bind 0.0.0.0:5000 --workers 1 --reload wsgi:app"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
