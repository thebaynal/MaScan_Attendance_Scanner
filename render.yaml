# Render.com Deployment Configuration
# This file defines the infrastructure for deploying to Render
# Reference: https://render.com/docs/infrastructure-as-code

services:
  # PostgreSQL Database
  - type: pserv
    name: mascan-attendance-db
    plan: free
    region: us-east

  # Flask Web Application
  - type: web
    name: mascan-attendance-web
    env: docker
    region: us-east
    plan: free
    
    # Docker build settings
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    
    # Environment variables (configure SECRET_KEY manually in dashboard)
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mascan-attendance-db
          property: connectionString
    
    # Auto-deploy on push to main branch
    autoDeploy: true
