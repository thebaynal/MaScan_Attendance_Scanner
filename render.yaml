# Render.com Deployment Configuration
# This file defines the infrastructure for deploying to Render
# Reference: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: mascan-attendance-web
    env: docker
    region: us-east
    plan: free
    
    # Docker build settings
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    
    # Build settings
    buildCommand: pip install -r app/requirements.txt
    
    # Service settings
    startCommand: cd app && gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 60 wsgi:app
    
    # Port
    port: 5000
    
    # Environment variables
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService: 
          type: redis
        fromField: Secret
      - key: DATABASE_URL
        fromDatabase:
          name: mascan-attendance-db
          property: connectionString
    
    # Disk for persistent file storage (optional)
    disks:
      - name: session-storage
        mountPath: /app/flask_session
        sizeGB: 1
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
  # PostgreSQL Database
  - type: pserv
    name: mascan-attendance-db
    plan: free
    ipAllowList: [] # Allow all IPs from web service
    region: us-east
